[api]
market_endpoint = "https://api.upbit.com/v1/market/all"
websocket_endpoint = "wss://api.upbit.com/websocket/v1"
notice_endpoint = "https://api-manager.upbit.com/api/v1/announcements?os=web&page=1&per_page=20&category=all"

[polling]
market_interval_seconds = 2
notice_interval_seconds = 3
websocket_reconnect_delay_seconds = 5

[redis]
url = "redis://127.0.0.1:6379"
key_prefix = "upbit:"
connection_timeout_seconds = 5

[telegram]
# Set via environment variables TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
bot_token = ""
chat_id = ""

[filters]
min_confidence = 0.6

[trading]
enabled = false                    # global kill-switch, default OFF

# Each user has independent exchange accounts, position sizes, and Telegram notifications.
# Env var override pattern: {UPPERCASE_NAME}_BYBIT_API_KEY, {UPPERCASE_NAME}_TELEGRAM_CHAT_ID, etc.

[[trading.users]]
name = "alice"
telegram_chat_id = ""             # env: ALICE_TELEGRAM_CHAT_ID
position_size_usd = 50.0
leverage = 2
max_open_positions = 3

[trading.users.take_profit]
levels = [
    { percent = 80.0, close_fraction = 0.5 },
    { percent = 100.0, close_fraction = 1.0 },
]

[trading.users.stop_loss]
percent = 15.0

[trading.users.time_exit]
minutes = 30

[trading.users.bybit]
# Set via environment variables ALICE_BYBIT_API_KEY and ALICE_BYBIT_API_SECRET
api_key = ""
api_secret = ""
testnet = true
base_url = "https://api-testnet.bybit.com"

[trading.users.binance]
# Set via environment variables ALICE_BINANCE_API_KEY and ALICE_BINANCE_API_SECRET
api_key = ""
api_secret = ""
testnet = true
base_url = "https://testnet.binancefuture.com"

[[trading.users]]
name = "bob"
telegram_chat_id = ""             # env: BOB_TELEGRAM_CHAT_ID
position_size_usd = 50.0
leverage = 2
max_open_positions = 3

[trading.users.take_profit]
levels = [
    { percent = 80.0, close_fraction = 0.5 },
    { percent = 100.0, close_fraction = 1.0 },
]

[trading.users.stop_loss]
percent = 15.0

[trading.users.time_exit]
minutes = 30

[trading.users.bybit]
# Set via environment variables BOB_BYBIT_API_KEY and BOB_BYBIT_API_SECRET
api_key = ""
api_secret = ""
testnet = true
base_url = "https://api-testnet.bybit.com"

[trading.users.binance]
# Set via environment variables BOB_BINANCE_API_KEY and BOB_BINANCE_API_SECRET
api_key = ""
api_secret = ""
testnet = true
base_url = "https://testnet.binancefuture.com"
